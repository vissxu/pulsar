name: Jira Sync
on:
  workflow_dispatch:
  issues:
    types: [opened, labeled, unlabeled]
  issue_comment:
    types: [created]
jobs:
  sync:
    name: Sync Items
    runs-on: ubuntu-latest
    steps:
      - name: Sync Github Issues to Jira
        uses: jordansilva/github-action-issue-to-jira@v1.1.2
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN_CLISSIC }}
        with:
          jiraHost: https://visxu.atlassian.net
          jiraUsername: visxu
          jiraPassword: ${{secrets.JIRA_API_TOKEN}} # See https://id.atlassian.com/manage-profile/security/api-tokens
          project: Pulsar
